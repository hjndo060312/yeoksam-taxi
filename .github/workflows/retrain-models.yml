name: Retrain Proxy Models

on:
  schedule:
    - cron: "35 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_MODEL_RETRAIN == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Restore training datasets
        env:
          LIVE_FEATURE_TABLE_URL: ${{ secrets.LIVE_FEATURE_TABLE_URL }}
          TOPIS_TRAFFIC_TABLE_URL: ${{ secrets.TOPIS_TRAFFIC_TABLE_URL }}
        run: |
          set -euo pipefail
          mkdir -p data/processed/features data/processed/topis

          if [ -n "${LIVE_FEATURE_TABLE_URL:-}" ]; then
            curl -fsSL "$LIVE_FEATURE_TABLE_URL" -o data/processed/features/dong_hour_features_v2_2023-01_2025-12.csv
          fi

          if [ -n "${TOPIS_TRAFFIC_TABLE_URL:-}" ]; then
            curl -fsSL "$TOPIS_TRAFFIC_TABLE_URL" -o data/processed/topis/topis_dong_hourly_2023-01_2026-03.csv
          fi

      - name: Retrain live-compatible demand model
        id: demand
        run: |
          set -euo pipefail
          if [ ! -f data/processed/features/dong_hour_features_v2_2023-01_2025-12.csv ]; then
            echo "trained=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping demand retrain. Missing data/processed/features/dong_hour_features_v2_2023-01_2025-12.csv or LIVE_FEATURE_TABLE_URL."
            exit 0
          fi

          python3 scripts/train_live_compatible_demand_proxy.py
          python3 scripts/build_pattern_cache.py
          echo "trained=true" >> "$GITHUB_OUTPUT"

      - name: Retrain traffic forecast model
        id: traffic
        run: |
          set -euo pipefail
          if [ ! -f data/processed/topis/topis_dong_hourly_2023-01_2026-03.csv ]; then
            echo "trained=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping traffic retrain. Missing data/processed/topis/topis_dong_hourly_2023-01_2026-03.csv or TOPIS_TRAFFIC_TABLE_URL."
            exit 0
          fi

          python3 scripts/train_traffic_forecast.py
          echo "trained=true" >> "$GITHUB_OUTPUT"

      - name: Fail if no model was retrained
        if: ${{ steps.demand.outputs.trained != 'true' && steps.traffic.outputs.trained != 'true' }}
        run: |
          echo "No model was retrained. Configure LIVE_FEATURE_TABLE_URL and/or TOPIS_TRAFFIC_TABLE_URL, or commit the required training data locally."
          exit 1

      - name: Persist retrained artifacts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            data/processed/model_live_compatible/dong_demand_proxy_model.joblib \
            data/processed/model_live_compatible/pattern_cache.json \
            data/processed/model_live_compatible/dong_demand_proxy_live_metrics.json \
            data/processed/model_live_compatible/dong_demand_proxy_live_feature_importance.json \
            data/processed/model_traffic_forecast/traffic_forecast_model.joblib \
            data/processed/model_traffic_forecast/traffic_pattern_cache.json \
            data/processed/model_traffic_forecast/traffic_forecast_metrics.json \
            public/traffic-forecast-summary.json
          if git diff --cached --quiet; then
            echo "No retrained model artifacts changed."
          else
            git commit -m "Retrain proxy forecast models [skip ci]"
            git push
          fi
